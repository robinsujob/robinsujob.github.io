mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.png"

[footer]
    since = 2023

[sidebar]
    emoji    = "🚀"
    avatar   = "img/avatar.png"

[article]
    toc         = true
    readingTime = true

    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[comments]
    enabled = false

[colorScheme]
    toggle  = true
    default = "auto"
